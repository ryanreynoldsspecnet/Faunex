services:
  caddy:
    image: caddy:2-alpine
    container_name: faunex-caddy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - faunex-web

  faunex-api:
    build:
      context: .
      dockerfile: Faunex.Api/Dockerfile
    container_name: faunex-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${FAUNEX_CONNECTIONSTRING}
      FAUNEX_JWT_ISSUER: ${FAUNEX_JWT_ISSUER}
      FAUNEX_JWT_AUDIENCE: ${FAUNEX_JWT_AUDIENCE}
      FAUNEX_JWT_SIGNING_KEY: ${FAUNEX_JWT_SIGNING_KEY}
      FAUNEX_SUPERADMIN_PASSWORD: ${FAUNEX_SUPERADMIN_PASSWORD}
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      - db

  faunex-web:
    build:
      context: .
      dockerfile: Faunex.Web/Dockerfile
    container_name: faunex-web
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__BaseUrl: http://faunex-api:8080
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      - faunex-api

  db:
    image: postgres:16
    container_name: faunex-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  postgres_data:
  dataprotection_keys:
  caddy_data:
  caddy_config:
