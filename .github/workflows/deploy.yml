name: Faunex Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Faunex.slnx

      - name: Check vulnerable packages
        shell: bash
        run: |
          set -euo pipefail
          output="$(dotnet list Faunex.slnx package --include-transitive --vulnerable)"
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "Vulnerable packages were detected. Deployment blocked."
            exit 1
          fi

      - name: Build
        run: dotnet build Faunex.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Faunex.slnx --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish Faunex.Api/Faunex.Api.csproj --configuration Release --no-build --output ./artifacts/api

      - name: Publish Web
        run: dotnet publish Faunex.Web/Faunex.Web.csproj --configuration Release --no-build --output ./artifacts/web -p:StaticWebAssetsMode=Publish

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH (decode key)
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Decode the key from base64 (avoids newline/format corruption)
          echo "${{ secrets.FAUNEX_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Prove it's a real key (safe)
          ssh-keygen -lf ~/.ssh/id_ed25519

          # Add server host key
          ssh-keyscan -H "${{ secrets.FAUNEX_SERVER_IP }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH handshake test
        shell: bash
        run: |
          set -euxo pipefail
          ssh -vvv \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ubuntu@${{ secrets.FAUNEX_SERVER_IP }} \
            "echo 'SSH OK FROM ACTIONS'"

      - name: Deploy
        shell: bash
        run: |
          set -euxo pipefail
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            ubuntu@${{ secrets.FAUNEX_SERVER_IP }} \
            'cd /home/ubuntu/faunex &&
             git pull origin master &&
             docker compose down &&
             docker compose up -d --build'
